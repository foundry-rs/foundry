[package]
name = "solar"
description = "Blazingly fast Solidity compiler"

version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[[bin]]
name = "solar"
path = "bin/main.rs"

[dependencies]
solar-cli.workspace = true

[features]
default = ["jemalloc", "asm-keccak"]
asm-keccak = ["solar-cli/asm"]
# Solar CLI's jemalloc feature depends on tikv-jemallocator 0.6, which conflicts with
# Foundry's workspace-wide tikv-jemallocator 0.7.
jemalloc = []
mimalloc = ["solar-cli/mimalloc"]
tracy-allocator = ["solar-cli/tracy-allocator"]
