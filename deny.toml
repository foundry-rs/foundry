# This section is considered when running `cargo deny check advisories`
# More documentation for the advisories section can be found here:
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
version = 2
yanked = "warn"
ignore = [
    # https://rustsec.org/advisories/RUSTSEC-2024-0436 paste! is unmaintained
    "RUSTSEC-2024-0436",
    # https://rustsec.org/advisories/RUSTSEC-2026-0173 proc-macro-error2 is unmaintained
    "RUSTSEC-2026-0173",
    # https://rustsec.org/advisories/RUSTSEC-2026-0194 quick-xml duplicate
    # attribute checking is quadratic.
    "RUSTSEC-2026-0194",
    # https://rustsec.org/advisories/RUSTSEC-2026-0195 quick-xml namespace
    # declaration handling can allocate without a bound. No fixed quick-junit,
    # inferno, or soldeer release is available for either advisory yet.
    "RUSTSEC-2026-0195",
]

# This section is considered when running `cargo deny check bans`.
# More documentation about the 'bans' section can be found here:
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "allow"
# Lint level for when a crate version requirement is `*`
wildcards = "allow"
highlight = "all"
# List of crates to deny
deny = [{ name = "openssl" }]
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = []
# Similarly to `skip` allows you to skip certain crates during duplicate
# detection. Unlike skip, it also includes the entire tree of transitive
# dependencies starting at the specified crate, up to a certain depth, which is
# by default infinite
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.8

# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for list of possible licenses
# [possible values: any SPDX 3.7 short identifier (+ optional exception)].
allow = [
    "0BSD",
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BlueOak-1.0.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDDL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "WTFPL",
    "Zlib",
]

# Allow 1 or more licenses on a per-crate basis, so that particular licenses
# aren't accepted for every possible crate as with the normal allow list
exceptions = [
    # CC0 is a permissive license but somewhat unclear status for source code
    # so we prefer to not have dependencies using it
    # https://tldrlegal.com/license/creative-commons-cc0-1.0-universal
    { allow = ["CC0-1.0"], name = "trezor-client" },
    { allow = ["CC0-1.0"], name = "notify" },
    { allow = ["CC0-1.0"], name = "dunce" },
    { allow = ["CC0-1.0"], name = "aurora-engine-modexp" },
    # Rendered mdBook HTML source code includes attribution as required by CC-BY-4.0
    { allow = ["CC-BY-4.0", "MIT"], name = "font-awesome-as-a-crate" },
]
# copyleft = "deny"

# See note in unicode-ident's readme!
[[licenses.clarify]]
name = "unicode-ident"
version = "*"
expression = "(MIT OR Apache-2.0) AND Unicode-DFS-2016"
license-files = [{ path = "LICENSE-UNICODE", hash = 0x3fb01745 }]

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# This section is considered when running `cargo deny check sources`.
# More documentation about the 'sources' section can be found here:
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "deny"
allow-git = [
    "https://github.com/foundry-rs/foundry-core",
    "https://github.com/paradigmxyz/solar",
    # Only for tests.
    "https://github.com/rust-cli/rexpect",
    # Tempo
    "https://github.com/tempoxyz/tempo",
    "https://github.com/tempoxyz/mpp-rs",
    # Monad
    "https://github.com/category-labs/alloy-monad-evm",
    "https://github.com/category-labs/monad-revm",
    # Transitive dependency of Tempo
    "https://github.com/commonwarexyz/monorepo",
    "https://github.com/paradigmxyz/reth",
    # Temporary: OP crates until upstream optimism bumps to revm 40.
    "https://github.com/foundry-rs/optimism",
    "https://github.com/foundry-rs/op-revm",
]
