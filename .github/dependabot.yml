version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions-weekly:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      cargo-weekly:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/npm"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      npm-weekly:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["minor", "patch"]
