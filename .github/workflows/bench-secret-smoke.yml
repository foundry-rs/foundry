name: bench secret smoke

permissions: {}

on:
  workflow_dispatch: {}
  push:
    branches:
      - test/bench-trigger-smoke

jobs:
  digest:
    runs-on: ubuntu-latest
    environment: bench
    steps:
      - name: Check EVENTS_AUTH fingerprint
        env:
          EVENTS_AUTH: ${{ secrets.EVENTS_AUTH }}
          EXPECTED_EVENTS_AUTH_SHA256: e20f22f71f99d978a02c2c2b6a77cf65d49bdbbd1a9a3f3c1109f2e01deead4c
          EXPECTED_EVENTS_AUTH_LEN: "57"
        run: |
          set -euo pipefail

          if [ -z "${EVENTS_AUTH:-}" ]; then
            echo "EVENTS_AUTH is empty or unavailable"
            exit 1
          fi

          case "$EVENTS_AUTH" in
            "Authorization: Bearer "*) echo "EVENTS_AUTH prefix=ok" ;;
            *)
              echo "EVENTS_AUTH prefix=bad"
              exit 1
              ;;
          esac

          actual_sha="$(printf '%s' "$EVENTS_AUTH" | shasum -a 256 | awk '{print $1}')"
          actual_len="$(printf '%s' "$EVENTS_AUTH" | wc -c | tr -d ' ')"

          printf 'EVENTS_AUTH sha256=%s\n' "$actual_sha"
          printf 'EVENTS_AUTH len=%s\n' "$actual_len"

          test "$actual_sha" = "$EXPECTED_EVENTS_AUTH_SHA256"
          test "$actual_len" = "$EXPECTED_EVENTS_AUTH_LEN"
