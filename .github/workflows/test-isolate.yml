# CI job to run tests with isolation mode enabled by default

name: test-isolate

permissions: {}

on:
  push:
    branches: [master]
  workflow_dispatch: # Needed so we can run it manually

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  nextest:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
    with:
      profile: isolate

  # If nextest fails, create a high-priority issue for isolation failures.
  issue-isolate:
    name: Open isolation issue
    runs-on: ubuntu-latest
    needs: [nextest]
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5 # v2.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_URL: |
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          update_existing: true
          filename: .github/TEST_ISOLATE_FAILURE_TEMPLATE.md
