name: Foundry Benchmarks

permissions: {}

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: "Baseline Foundry version (e.g., stable, v1.3.6, commit hash)"
        required: false
        type: string
        default: "stable"
      feature:
        description: "Feature Foundry version to compare against baseline"
        required: false
        type: string
        default: "nightly"
      benchmarks:
        description: "Comma-separated benchmarks (forge_test,forge_fuzz_test,forge_invariant_test,forge_fork_test,forge_isolate_test,forge_build_no_cache,forge_build_with_cache,forge_coverage)"
        required: false
        type: string
        default: "forge_test,forge_fuzz_test,forge_invariant_test"
      repos:
        description: "Comma-separated repos (org/repo[:rev])"
        required: false
        type: string
        default: "ithacaxyz/account:v0.3.2,Vectorized/solady:v0.1.22"
      noise_threshold:
        description: "Noise threshold percentage for verdict classification"
        required: false
        type: string
        default: "3.0"
      pr_number:
        description: "PR number to comment on (optional)"
        required: false
        type: string

env:
  RUSTC_WRAPPER: "sccache"

jobs:
  run-benchmarks:
    name: Run Benchmarks
    runs-on: depot-ubuntu-24.04-32
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable

      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Setup Foundry
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          ./.github/scripts/setup-foundryup.sh
          printf '%s\n' "$GITHUB_WORKSPACE/.foundry/bin" >> "$GITHUB_PATH"

      - name: Build benchmark binary
        run: cargo build --release --bin foundry-bench

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install hyperfine
        run: |
          curl -L https://github.com/sharkdp/hyperfine/releases/download/v1.19.0/hyperfine-v1.19.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv hyperfine-v1.19.0-x86_64-unknown-linux-gnu/hyperfine /usr/local/bin/
          rm -rf hyperfine-v1.19.0-x86_64-unknown-linux-gnu

      - name: Run benchmarks
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
        run: |
          BASELINE="${{ github.event.inputs.baseline || 'stable' }}"
          FEATURE="${{ github.event.inputs.feature || 'nightly' }}"
          BENCHMARKS="${{ github.event.inputs.benchmarks || 'forge_test,forge_fuzz_test,forge_invariant_test' }}"
          REPOS="${{ github.event.inputs.repos || 'ithacaxyz/account:v0.3.2,Vectorized/solady:v0.1.22' }}"
          NOISE="${{ github.event.inputs.noise_threshold || '3.0' }}"

          ./target/release/foundry-bench \
            --baseline "$BASELINE" \
            --feature "$FEATURE" \
            --benchmarks "$BENCHMARKS" \
            --repos "$REPOS" \
            --noise-threshold "$NOISE" \
            --force-install \
            --output-dir ./benches \
            --output-file LATEST.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benches/LATEST.md

    outputs:
      has_results: ${{ steps.benchmark_results.outputs.has_results || 'true' }}

  publish-results:
    name: Publish Results
    needs: run-benchmarks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event.inputs.pr_number != ''
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
          path: benches/

      - name: Read results
        id: read_results
        run: |
          {
            echo 'pr_comment<<EOF'
            cat benches/LATEST.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ github.event.inputs.pr_number }};
            const results = process.env.PR_COMMENT;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: results + '\n\n---\n\n🤖 Generated by [Foundry Benchmarks](https://github.com/${{ github.repository }}/actions/workflows/benchmarks.yml).'
            });
        env:
          PR_COMMENT: ${{ steps.read_results.outputs.pr_comment }}
