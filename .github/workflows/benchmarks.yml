name: Foundry Benchmarks

permissions: {}

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment on (optional)"
        required: false
        type: string
      versions:
        description: "Comma-separated list of Foundry versions to benchmark (optional, defaults to 'v1.5.1,v1.7.0')"
        required: false
        type: string
      repos:
        description: "Comma-separated repos to benchmark. Each entry: org/repo[:rev] (e.g. aave/aave-v4:af1f0f2ba323ac6fbaaee3abf6be060c78e22d35). Leave empty to use the per-benchmark default repo lists."
        required: false
        type: string

env:
  DEFAULT_VERSIONS: "v1.5.1,v1.7.0"

  # Repos to benchmark per step. Each comma-separated entry has the form
  #   org/repo[:rev][ <extra args>]
  # where anything after the first whitespace is appended to every benchmark
  # command for that repo (use this to skip a broken test contract via e.g.
  # `--nmc BrokenTest`, so a single failing test does not fail the whole CI).
  TEST_REPOS: >-
    ithacaxyz/account:v0.5.7,
    vectorized/solady:v0.1.26 --nmc 'LifebuoyTest|LibBitTest|Base58Test',
    uniswap/v4-core:46c6834698c48bc4a463a86d8420f4eb1d7f3b75 --nmc 'TickMathTestTest',
    sparkdotfi/spark-psm:v1.0.0 --nmc PSMInvariants_TimeBasedRateSetting_WithTransfers_WithPocketSetting

  ISOLATE_TEST_REPOS: >-
    ithacaxyz/account:v0.5.7 --nmc SimulateExecuteTest,
    vectorized/solady:v0.1.26 --nmc 'SafeTransferLibTest|LifebuoyTest|LibBitTest|Base58Test|LibStringTest',
    uniswap/v4-core:46c6834698c48bc4a463a86d8420f4eb1d7f3b75 --nmc 'TickMathTestTest',
    sparkdotfi/spark-psm:v1.0.0 --nmc PSMInvariants_TimeBasedRateSetting_WithTransfers_WithPocketSetting

  BUILD_REPOS: >-
    ithacaxyz/account:v0.5.7,
    vectorized/solady:v0.1.26,
    uniswap/v4-core:46c6834698c48bc4a463a86d8420f4eb1d7f3b75,
    sparkdotfi/spark-psm:v1.0.0

  COVERAGE_REPOS: >-
    ithacaxyz/account:v0.5.7,
    uniswap/v4-core:46c6834698c48bc4a463a86d8420f4eb1d7f3b75,
    sparkdotfi/spark-psm:v1.0.0

  RUSTC_WRAPPER: "sccache"

jobs:
  run-benchmarks:
    name: Run All Benchmarks
    runs-on: depot-ubuntu-24.04-32
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable

      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Setup Foundry
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          ./.github/scripts/setup-foundryup.sh
          printf '%s\n' "$GITHUB_WORKSPACE/.foundry/bin" >> "$GITHUB_PATH"

      - name: Build benchmark binary
        run: cargo build --locked --release --bin foundry-bench

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install hyperfine
        run: |
          curl -L https://github.com/sharkdp/hyperfine/releases/download/v1.19.0/hyperfine-v1.19.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv hyperfine-v1.19.0-x86_64-unknown-linux-gnu/hyperfine /usr/local/bin/
          rm -rf hyperfine-v1.19.0-x86_64-unknown-linux-gnu

      - name: Run forge test benchmarks
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
          VERSIONS: ${{ github.event.inputs.versions || env.DEFAULT_VERSIONS }}
          REPOS: ${{ github.event.inputs.repos || env.TEST_REPOS }}
        run: |
          ./target/release/foundry-bench --output-dir ./benches --force-install \
            --versions "$VERSIONS" \
            --repos "$REPOS" \
            --benchmarks forge_test,forge_fuzz_test \
            --output-file forge_test_bench.md \
            --verbose

      - name: Run forge isolate test benchmarks
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
          VERSIONS: ${{ github.event.inputs.versions || env.DEFAULT_VERSIONS }}
          REPOS: ${{ github.event.inputs.repos || env.ISOLATE_TEST_REPOS }}
        run: |
          ./target/release/foundry-bench --output-dir ./benches --force-install \
            --versions "$VERSIONS" \
            --repos "$REPOS" \
            --benchmarks forge_isolate_test \
            --output-file forge_isolate_test_bench.md \
            --verbose

      - name: Run forge build benchmarks
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
          VERSIONS: ${{ github.event.inputs.versions || env.DEFAULT_VERSIONS }}
          REPOS: ${{ github.event.inputs.repos || env.BUILD_REPOS }}
        run: |
          ./target/release/foundry-bench --output-dir ./benches --force-install \
            --versions "$VERSIONS" \
            --repos "$REPOS" \
            --benchmarks forge_build_no_cache,forge_build_with_cache \
            --output-file forge_build_bench.md \
            --verbose

      - name: Run forge coverage benchmarks
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
          VERSIONS: ${{ github.event.inputs.versions || env.DEFAULT_VERSIONS }}
          REPOS: ${{ github.event.inputs.repos || env.COVERAGE_REPOS }}
        run: |
          ./target/release/foundry-bench --output-dir ./benches --force-install \
            --versions "$VERSIONS" \
            --repos "$REPOS" \
            --benchmarks forge_coverage \
            --output-file forge_coverage_bench.md \
            --verbose

      - name: Combine benchmark results
        run: ./.github/scripts/combine-benchmarks.sh benches

      - name: Read benchmark results
        id: benchmark_results
        run: ./.github/scripts/read-benchmark-results.sh benches

      - name: Upload benchmark results as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: |
            benches/forge_test_bench.md
            benches/forge_isolate_test_bench.md
            benches/forge_build_bench.md
            benches/forge_coverage_bench.md
            benches/LATEST.md

    outputs:
      pr_comment: ${{ steps.benchmark_results.outputs.pr_comment }}

  publish-results:
    name: Publish Results
    needs: run-benchmarks
    runs-on: ubuntu-latest
    # All git writes happen here, on a clean ubuntu-latest runner that has
    # never executed third-party benchmark code.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # persist-credentials defaults to true so we can push.

      - name: Download benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: benchmark-results
          path: benches/

      - name: Commit benchmark results
        id: commit_results
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: ./.github/scripts/commit-benchmark-results.sh benches "${{ github.event_name }}" "${{ github.repository }}"

      - name: Create PR for manual runs
        if: github.event_name == 'workflow_dispatch' && steps.commit_results.outputs.committed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BRANCH_NAME: ${{ steps.commit_results.outputs.branch_name }}
          PR_COMMENT: ${{ needs.run-benchmarks.outputs.pr_comment }}
        with:
          script: |
            const branchName = process.env.BRANCH_NAME;
            const prComment = process.env.PR_COMMENT;

            // Create the pull request
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore(bench): update benchmark results',
              head: branchName,
              base: 'master',
              body: `## Benchmark Results Update

            This PR contains the latest benchmark results from a manual workflow run.

            ${prComment}

            ---

            🤖 This PR was automatically generated by the [Foundry Benchmarks workflow](https://github.com/${{ github.repository }}/actions).`
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);

      - name: Comment on PR
        if: github.event.inputs.pr_number != '' || github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_COMMENT: ${{ needs.run-benchmarks.outputs.pr_comment }}
        with:
          script: |
            const prNumber = ${{ github.event.inputs.pr_number || github.event.pull_request.number }};
            const prComment = process.env.PR_COMMENT;

            const comment = `${prComment}

            ---

            🤖 This comment was automatically generated by the [Foundry Benchmarks workflow](https://github.com/${{ github.repository }}/actions).

            To run benchmarks manually: Go to [Actions](https://github.com/${{ github.repository }}/actions/workflows/benchmarks.yml) → "Run workflow"`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
