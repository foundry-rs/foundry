name: Foundry Benchmarks

permissions: {}

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: "Baseline Foundry version (e.g., stable, v1.3.6, commit hash)"
        required: false
        type: string
        default: "stable"
      feature:
        description: "Feature Foundry version to compare against baseline"
        required: false
        type: string
        default: "nightly"
      benchmarks:
        description: "Comma-separated benchmarks (forge_test,forge_fuzz_test,forge_invariant_test,forge_fork_test,forge_isolate_test,forge_build_no_cache,forge_build_with_cache,forge_coverage)"
        required: false
        type: string
        default: "forge_test,forge_fuzz_test,forge_invariant_test"
      repos:
        description: "Comma-separated repos (org/repo[:rev])"
        required: false
        type: string
        default: "ithacaxyz/account:v0.3.2,Vectorized/solady:v0.1.22"
      noise_threshold:
        description: "Noise threshold percentage for verdict classification"
        required: false
        type: string
        default: "3.0"
      pr_number:
        description: "PR number to comment on (optional)"
        required: false
        type: string

env:
  RUSTC_WRAPPER: "sccache"

jobs:
  run-benchmarks:
    name: Run Benchmarks
    runs-on: depot-ubuntu-24.04-32
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable

      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Setup Foundry
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          ./.github/scripts/setup-foundryup.sh
          printf '%s\n' "$GITHUB_WORKSPACE/.foundry/bin" >> "$GITHUB_PATH"

      - name: Build benchmark binary
        run: cargo build --release --bin foundry-bench

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install hyperfine
        run: |
          curl -L https://github.com/sharkdp/hyperfine/releases/download/v1.19.0/hyperfine-v1.19.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv hyperfine-v1.19.0-x86_64-unknown-linux-gnu/hyperfine /usr/local/bin/
          rm -rf hyperfine-v1.19.0-x86_64-unknown-linux-gnu

      - name: Run benchmarks
        env:
          FOUNDRY_DIR: ${{ github.workspace }}/.foundry
        run: |
          BASELINE="${{ github.event.inputs.baseline || 'stable' }}"
          FEATURE="${{ github.event.inputs.feature || 'nightly' }}"
          BENCHMARKS="${{ github.event.inputs.benchmarks || 'forge_test,forge_fuzz_test,forge_invariant_test' }}"
          REPOS="${{ github.event.inputs.repos || 'ithacaxyz/account:v0.3.2,Vectorized/solady:v0.1.22' }}"
          NOISE="${{ github.event.inputs.noise_threshold || '3.0' }}"

          # Run benchmarks once and generate markdown report
          ./target/release/foundry-bench \
            --baseline "$BASELINE" \
            --feature "$FEATURE" \
            --benchmarks "$BENCHMARKS" \
            --repos "$REPOS" \
            --noise-threshold "$NOISE" \
            --force-install \
            --output-dir ./benches \
            --output-file LATEST.md

      - name: Commit and read benchmark results
        id: benchmark_results
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: ./.github/scripts/commit-and-read-benchmarks.sh benches "${{ github.event_name }}" "${{ github.repository }}"

      - name: Upload benchmark results as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benches/LATEST.md

    outputs:
      branch_name: ${{ steps.benchmark_results.outputs.branch_name }}
      pr_comment: ${{ steps.benchmark_results.outputs.pr_comment }}

  publish-results:
    name: Publish Results
    needs: run-benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
          path: benches/

      - name: Push branch for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          git push origin "${{ needs.run-benchmarks.outputs.branch_name }}"
          echo "Pushed branch: ${{ needs.run-benchmarks.outputs.branch_name }}"

      - name: Create PR for manual runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const branchName = '${{ needs.run-benchmarks.outputs.branch_name }}';
            const prComment = `${{ needs.run-benchmarks.outputs.pr_comment }}`;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore(bench): update benchmark results',
              head: branchName,
              base: 'master',
              body: `## Benchmark Results Update

            This PR contains the latest benchmark results.

            ${prComment}

            ---

            🤖 Generated by [Foundry Benchmarks](https://github.com/${{ github.repository }}/actions).`
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);

      - name: Comment on PR
        if: github.event.inputs.pr_number != '' || github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ github.event.inputs.pr_number || github.event.pull_request.number }};
            const prComment = `${{ needs.run-benchmarks.outputs.pr_comment }}`;

            const comment = `${prComment}

            ---

            🤖 Generated by [Foundry Benchmarks](https://github.com/${{ github.repository }}/actions).

            To run benchmarks manually: Go to [Actions](https://github.com/${{ github.repository }}/actions/workflows/benchmarks.yml) → "Run workflow"`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
